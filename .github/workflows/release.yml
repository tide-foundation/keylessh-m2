name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Punchd Gateway (Rust) ── builds for Linux and Windows
  build-gateway:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: punchd-gateway-linux-x64
            binary: punchd-gateway
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: punchd-gateway-windows-x64
            binary: punchd-gateway.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build gateway
        run: cargo build --release --manifest-path bridges/punchd-bridge-rs/Cargo.toml --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "bridges/punchd-bridge-rs/target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── SSH Bridge (Rust) ── builds for Linux and Windows
  build-ssh-bridge:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ssh-bridge-linux-x64
            binary: SSH-Bridge
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ssh-bridge-windows-x64
            binary: SSH-Bridge.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build SSH bridge
        run: cargo build --release --manifest-path bridges/ssh-bridge-rs/Cargo.toml --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "bridges/ssh-bridge-rs/target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── TideSSP (Windows MSI) ──
  build-tidessp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build TideSSP DLLs
        run: |
          cmake -B tide-ssp/build -S tide-ssp -A x64
          cmake --build tide-ssp/build --config Release

      - name: Build MSI
        run: |
          wix build tide-ssp/installer/Product.wxs -arch x64 -bindpath BinDir=tide-ssp/build/Release -bindpath InstallerDir=tide-ssp/installer -o tide-ssp/out/TideSSP.msi

      - uses: actions/upload-artifact@v4
        with:
          name: TideSSP-installer
          path: tide-ssp/out/TideSSP.msi

  # ── Create GitHub Release ──
  release:
    needs: [build-gateway, build-ssh-bridge, build-tidessp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/punchd-gateway-linux-x64/*.tar.gz
            artifacts/punchd-gateway-windows-x64/*.tar.gz
            artifacts/ssh-bridge-linux-x64/*.tar.gz
            artifacts/ssh-bridge-windows-x64/*.tar.gz
            artifacts/TideSSP-installer/TideSSP.msi
