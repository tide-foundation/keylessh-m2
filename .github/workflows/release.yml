name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for manual release, e.g. 1.0.1 or 1.0.1_beta"
        required: true
        default: "1.0.1"
      create_release:
        description: "Create a GitHub Release?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════
  # Punchd VPN Client — Windows MSI (with WebView2 DPoP)
  # ════════════════════════════════════════════════════════════════
  build-vpn-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: choco install mingw -y

      - name: Build VPN client (GNU target)
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --bin punchd-vpn --target x86_64-pc-windows-gnu --features webview
          Copy-Item target/x86_64-pc-windows-gnu/release/punchd-vpn.exe wix/
          Copy-Item webview2/WebView2Loader_amd64.dll wix/WebView2Loader.dll

      - name: Compile custom actions DLL (MSVC)
        working-directory: bridges/punchd-bridge-rs/wix
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64
          cl /LD /O2 ca\PunchdCA.c ca\PunchdCA.def /Fe:ca\PunchdCA.dll /link msi.lib advapi32.lib shell32.lib user32.lib ole32.lib

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2

      - name: Build MSI
        working-directory: bridges/punchd-bridge-rs/wix
        run: wix build punchd-vpn.wxs -arch x64 -o punchd-vpn.msi

      - uses: actions/upload-artifact@v4
        with:
          name: punchd-vpn-windows-msi
          path: bridges/punchd-bridge-rs/wix/punchd-vpn.msi

  # ════════════════════════════════════════════════════════════════
  # Punchd VPN Client — Linux .deb (with WebView/webkit2gtk)
  # ════════════════════════════════════════════════════════════════
  build-vpn-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
          cargo install cargo-deb

      - name: Build deb
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --bin punchd-vpn --features webview
          cargo deb --no-build

      - uses: actions/upload-artifact@v4
        with:
          name: punchd-vpn-linux-deb
          path: bridges/punchd-bridge-rs/target/debian/*.deb

  # ════════════════════════════════════════════════════════════════
  # Punchd VPN Client — Arch/CachyOS package
  # ════════════════════════════════════════════════════════════════
  build-vpn-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            rust \
            cargo \
            git \
            pkgconf \
            openssl \
            gtk3 \
            webkit2gtk-4.1 \
            libsoup3 \
            sudo

      - name: Create unprivileged build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Create PKGBUILD
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          # Arch pkgver cannot contain colons, forward slashes, hyphens, or whitespace.
          # Examples:
          #   v1.0.1-beta -> 1.0.1_beta
          #   1.0.1 beta  -> 1.0.1_beta
          VERSION="${VERSION#v}"
          VERSION="$(echo "$VERSION" | sed -E 's/[-:\/[:space:]]+/_/g')"

          mkdir -p archpkg

          cat > archpkg/PKGBUILD <<'PKGBUILD_EOF'
          pkgname=punchd-vpn
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="Punchd VPN Client with WebView DPoP"
          arch=('x86_64')
          url="https://github.com/__GITHUB_REPOSITORY__"
          license=('custom')
          depends=(
            'gtk3'
            'webkit2gtk-4.1'
            'libsoup3'
            'openssl'
          )
          makedepends=(
            'rust'
            'cargo'
          )
          source=()
          sha256sums=()

          build() {
            cd "$srcdir/.."
            cargo build --release --bin punchd-vpn --features webview \
              --manifest-path bridges/punchd-bridge-rs/Cargo.toml
          }

          package() {
            cd "$srcdir/.."

            install -Dm755 bridges/punchd-bridge-rs/target/release/punchd-vpn \
              "$pkgdir/usr/bin/punchd-vpn"

            if [ -f bridges/punchd-bridge-rs/assets/punchd-vpn.desktop ]; then
              install -Dm644 bridges/punchd-bridge-rs/assets/punchd-vpn.desktop \
                "$pkgdir/usr/share/applications/punchd-vpn.desktop"
            fi

            if [ -f bridges/punchd-bridge-rs/assets/punchd-vpn.png ]; then
              install -Dm644 bridges/punchd-bridge-rs/assets/punchd-vpn.png \
                "$pkgdir/usr/share/pixmaps/punchd-vpn.png"
            fi

            if [ -f LICENSE ]; then
              install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$pkgname/LICENSE"
            elif [ -f bridges/punchd-bridge-rs/LICENSE ]; then
              install -Dm644 bridges/punchd-bridge-rs/LICENSE \
                "$pkgdir/usr/share/licenses/$pkgname/LICENSE"
            fi
          }
          PKGBUILD_EOF

          sed -i "s/__VERSION__/${VERSION:-1.0.0}/g" archpkg/PKGBUILD
          sed -i "s#__GITHUB_REPOSITORY__#${GITHUB_REPOSITORY}#g" archpkg/PKGBUILD
          sed -i 's/^          //' archpkg/PKGBUILD
          chown -R builder:builder archpkg

      - name: Build Arch/CachyOS package
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          cd archpkg
          sudo -u builder makepkg -sf --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: punchd-vpn-arch
          path: archpkg/*.pkg.tar.zst

  # ════════════════════════════════════════════════════════════════
  # Punchd VPN Client — macOS (x64 + ARM64)
  # ════════════════════════════════════════════════════════════════
  build-vpn-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: punchd-vpn-macos-x64
          - target: aarch64-apple-darwin
            artifact: punchd-vpn-macos-arm64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --bin punchd-vpn \
            --manifest-path bridges/punchd-bridge-rs/Cargo.toml \
            --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp bridges/punchd-bridge-rs/target/${{ matrix.target }}/release/punchd-vpn dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ════════════════════════════════════════════════════════════════
  # PunchdEndpoint — Windows combined MSI (TideSSP + Gateway)
  # ════════════════════════════════════════════════════════════════
  build-endpoint-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: choco install mingw -y

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2
          wix extension add --global WixToolset.Util.wixext/6.0.2

      - name: Build TideSSP DLLs (MSVC)
        run: |
          cmake -B tide-ssp/build -S tide-ssp -A x64
          cmake --build tide-ssp/build --config Release

      - name: Build Gateway (GNU — static binary)
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --target x86_64-pc-windows-gnu --bin punchd-bridge-rs
          New-Item -ItemType Directory -Force -Path target/release
          Copy-Item target/x86_64-pc-windows-gnu/release/punchd-bridge-rs.exe target/release/

      - name: Build combined MSI
        run: |
          New-Item -ItemType Directory -Force -Path tide-ssp/out
          wix build tide-ssp/installer/WorkstationProduct.wxs -arch x64 `
            -bindpath BinDir=tide-ssp/build/Release `
            -bindpath InstallerDir=tide-ssp/installer `
            -bindpath PunchdDir=bridges/punchd-bridge-rs/target/release `
            -o tide-ssp/out/PunchdEndpoint.msi

      - uses: actions/upload-artifact@v4
        with:
          name: PunchdEndpoint-windows-msi
          path: tide-ssp/out/PunchdEndpoint.msi

  # ════════════════════════════════════════════════════════════════
  # PunchdEndpoint — Linux .deb (Gateway only, TideSSP is Windows-only)
  # ════════════════════════════════════════════════════════════════
  build-endpoint-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build gateway
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --bin punchd-bridge-rs

      - name: Package deb
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          # Keep Debian version safe too.
          VERSION="${VERSION#v}"
          VERSION="$(echo "$VERSION" | sed -E 's/[:\/[:space:]]+/_/g')"

          mkdir -p pkg-deb/DEBIAN pkg-deb/usr/bin pkg-deb/etc/punchd-gateway
          cp bridges/punchd-bridge-rs/target/release/punchd-bridge-rs pkg-deb/usr/bin/
          chmod 755 pkg-deb/usr/bin/punchd-bridge-rs

          cat > pkg-deb/DEBIAN/control <<EOF
          Package: punchd-gateway
          Version: ${VERSION:-1.0.0}
          Architecture: amd64
          Maintainer: KeyleSSH <support@keylessh.com>
          Depends: ca-certificates, libssl3
          Section: net
          Priority: optional
          Description: Punchd Gateway - NAT-traversing reverse proxy with QUIC VPN and DPoP
          EOF

          sed -i 's/^          //' pkg-deb/DEBIAN/control
          dpkg-deb --build pkg-deb punchd-gateway-linux-x64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: punchd-gateway-linux-deb
          path: punchd-gateway-linux-x64.deb

  # ════════════════════════════════════════════════════════════════
  # PunchdEndpoint — macOS (Gateway binary, x64 + ARM64)
  # ════════════════════════════════════════════════════════════════
  build-endpoint-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: punchd-gateway-macos-x64
          - target: aarch64-apple-darwin
            artifact: punchd-gateway-macos-arm64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build gateway
        run: |
          cargo build --release --bin punchd-bridge-rs \
            --manifest-path bridges/punchd-bridge-rs/Cargo.toml \
            --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp bridges/punchd-bridge-rs/target/${{ matrix.target }}/release/punchd-bridge-rs dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ════════════════════════════════════════════════════════════════
  # PunchdGateway — standalone Windows MSI (Gateway only, no TideSSP)
  # ════════════════════════════════════════════════════════════════
  build-gateway-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: choco install mingw -y

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2

      - name: Build Gateway (GNU — static binary)
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --target x86_64-pc-windows-gnu --bin punchd-bridge-rs
          New-Item -ItemType Directory -Force -Path target/release
          Copy-Item target/x86_64-pc-windows-gnu/release/punchd-bridge-rs.exe target/release/

      - name: Build MSI
        run: |
          New-Item -ItemType Directory -Force -Path bridges/punchd-bridge-rs/out
          wix build bridges/punchd-bridge-rs/installer/GatewayProduct.wxs -arch x64 `
            -bindpath PunchdDir=bridges/punchd-bridge-rs/target/release `
            -o bridges/punchd-bridge-rs/out/PunchdGateway.msi

      - uses: actions/upload-artifact@v4
        with:
          name: PunchdGateway-windows-msi
          path: bridges/punchd-bridge-rs/out/PunchdGateway.msi

  # ════════════════════════════════════════════════════════════════
  # TideSSP — standalone MSI (Windows only, passwordless RDP)
  # ════════════════════════════════════════════════════════════════
  build-tidessp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WiX
        run: dotnet tool install --global wix --version 6.0.2

      - name: Build TideSSP DLLs
        run: |
          cmake -B tide-ssp/build -S tide-ssp -A x64
          cmake --build tide-ssp/build --config Release

      - name: Build MSI
        run: |
          New-Item -ItemType Directory -Force -Path tide-ssp/out
          wix build tide-ssp/installer/Product.wxs -arch x64 `
            -bindpath BinDir=tide-ssp/build/Release `
            -bindpath InstallerDir=tide-ssp/installer `
            -o tide-ssp/out/TideSSP.msi

      - uses: actions/upload-artifact@v4
        with:
          name: TideSSP-installer
          path: tide-ssp/out/TideSSP.msi

  # ════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ════════════════════════════════════════════════════════════════
  release:
    needs:
      - build-vpn-msi
      - build-vpn-deb
      - build-vpn-arch
      - build-vpn-macos
      - build-endpoint-windows
      - build-endpoint-linux
      - build-endpoint-macos
      - build-gateway-windows
      - build-tidessp

    if: github.event_name == 'push' || github.event.inputs.create_release == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
            SAFE_VERSION="$(echo "$VERSION" | sed -E 's/[\/[:space:]]+/_/g')"
            TAG_NAME="v${SAFE_VERSION}"
            RELEASE_NAME="v${SAFE_VERSION}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="${GITHUB_REF_NAME}"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          files: |
            artifacts/punchd-vpn-windows-msi/punchd-vpn.msi
            artifacts/punchd-vpn-linux-deb/*.deb
            artifacts/punchd-vpn-arch/*.pkg.tar.zst
            artifacts/punchd-vpn-macos-x64/*.tar.gz
            artifacts/punchd-vpn-macos-arm64/*.tar.gz
            artifacts/PunchdEndpoint-windows-msi/PunchdEndpoint.msi
            artifacts/PunchdGateway-windows-msi/PunchdGateway.msi
            artifacts/punchd-gateway-linux-deb/punchd-gateway-linux-x64.deb
            artifacts/punchd-gateway-macos-x64/*.tar.gz
            artifacts/punchd-gateway-macos-arm64/*.tar.gz
            artifacts/TideSSP-installer/TideSSP.msi
