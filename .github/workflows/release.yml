name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════
  # Punchd VPN Client — Windows MSI (with WebView2 DPoP)
  # ════════════════════════════════════════════════════════════════
  build-vpn-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW
        run: choco install mingw -y
      - name: Build VPN client (GNU target)
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --bin punchd-vpn --target x86_64-pc-windows-gnu --features webview
          Copy-Item target/x86_64-pc-windows-gnu/release/punchd-vpn.exe wix/
          Copy-Item webview2/WebView2Loader_amd64.dll wix/WebView2Loader.dll
      - name: Compile custom actions DLL (MSVC)
        working-directory: bridges/punchd-bridge-rs/wix
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64
          cl /LD /O2 ca\PunchdCA.c ca\PunchdCA.def /Fe:ca\PunchdCA.dll /link msi.lib advapi32.lib shell32.lib user32.lib ole32.lib
      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2
      - name: Build MSI
        working-directory: bridges/punchd-bridge-rs/wix
        run: wix build punchd-vpn.wxs -arch x64 -o punchd-vpn.msi
      - uses: actions/upload-artifact@v4
        with:
          name: punchd-vpn-windows-msi
          path: bridges/punchd-bridge-rs/wix/punchd-vpn.msi

  # ════════════════════════════════════════════════════════════════
  # Punchd VPN Client — Linux .deb (with WebView/webkit2gtk)
  # ════════════════════════════════════════════════════════════════
  build-vpn-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
          cargo install cargo-deb
      - name: Build deb
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --bin punchd-vpn --features webview
          cargo deb --no-build
      - uses: actions/upload-artifact@v4
        with:
          name: punchd-vpn-linux-deb
          path: bridges/punchd-bridge-rs/target/debian/*.deb

  # ════════════════════════════════════════════════════════════════
  # Punchd VPN Client — macOS (x64 + ARM64)
  # ════════════════════════════════════════════════════════════════
  build-vpn-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: punchd-vpn-macos-x64
          - target: aarch64-apple-darwin
            artifact: punchd-vpn-macos-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: |
          cargo build --release --bin punchd-vpn \
            --manifest-path bridges/punchd-bridge-rs/Cargo.toml \
            --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp bridges/punchd-bridge-rs/target/${{ matrix.target }}/release/punchd-vpn dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ════════════════════════════════════════════════════════════════
  # PunchdEndpoint — Windows combined MSI (TideSSP + Gateway)
  # ════════════════════════════════════════════════════════════════
  build-endpoint-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW
        run: choco install mingw -y
      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2
          wix extension add --global WixToolset.Util.wixext/6.0.2
      - name: Build TideSSP DLLs (MSVC)
        run: |
          cmake -B tide-ssp/build -S tide-ssp -A x64
          cmake --build tide-ssp/build --config Release
      - name: Build Gateway (GNU — static binary)
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --target x86_64-pc-windows-gnu --bin punchd-bridge-rs
          New-Item -ItemType Directory -Force -Path target/release
          Copy-Item target/x86_64-pc-windows-gnu/release/punchd-bridge-rs.exe target/release/
      - name: Build combined MSI
        run: |
          New-Item -ItemType Directory -Force -Path tide-ssp/out
          wix build tide-ssp/installer/WorkstationProduct.wxs -arch x64 `
            -bindpath BinDir=tide-ssp/build/Release `
            -bindpath InstallerDir=tide-ssp/installer `
            -bindpath PunchdDir=bridges/punchd-bridge-rs/target/release `
            -o tide-ssp/out/PunchdEndpoint.msi
      - uses: actions/upload-artifact@v4
        with:
          name: PunchdEndpoint-windows-msi
          path: tide-ssp/out/PunchdEndpoint.msi

  # ════════════════════════════════════════════════════════════════
  # PunchdEndpoint — Linux .deb (Gateway only, TideSSP is Windows-only)
  # ════════════════════════════════════════════════════════════════
  build-endpoint-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build gateway
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --bin punchd-bridge-rs
      - name: Package deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p pkg-deb/DEBIAN pkg-deb/usr/bin pkg-deb/etc/punchd-gateway
          cp bridges/punchd-bridge-rs/target/release/punchd-bridge-rs pkg-deb/usr/bin/
          chmod 755 pkg-deb/usr/bin/punchd-bridge-rs
          cat > pkg-deb/DEBIAN/control << EOF
          Package: punchd-gateway
          Version: ${VERSION:-1.0.0}
          Architecture: amd64
          Maintainer: KeyleSSH <support@keylessh.com>
          Depends: ca-certificates, libssl3
          Section: net
          Priority: optional
          Description: Punchd Gateway - NAT-traversing reverse proxy with QUIC VPN and DPoP
          EOF
          dpkg-deb --build pkg-deb punchd-gateway-linux-x64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: punchd-gateway-linux-deb
          path: punchd-gateway-linux-x64.deb

  # ════════════════════════════════════════════════════════════════
  # PunchdEndpoint — macOS (Gateway binary, x64 + ARM64)
  # ════════════════════════════════════════════════════════════════
  build-endpoint-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: punchd-gateway-macos-x64
          - target: aarch64-apple-darwin
            artifact: punchd-gateway-macos-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build gateway
        run: |
          cargo build --release --bin punchd-bridge-rs \
            --manifest-path bridges/punchd-bridge-rs/Cargo.toml \
            --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp bridges/punchd-bridge-rs/target/${{ matrix.target }}/release/punchd-bridge-rs dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ════════════════════════════════════════════════════════════════
  # PunchdGateway — standalone Windows MSI (Gateway only, no TideSSP)
  # ════════════════════════════════════════════════════════════════
  build-gateway-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW
        run: choco install mingw -y
      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2
      - name: Build Gateway (GNU — static binary)
        run: |
          cd bridges/punchd-bridge-rs
          cargo build --release --target x86_64-pc-windows-gnu --bin punchd-bridge-rs
          New-Item -ItemType Directory -Force -Path target/release
          Copy-Item target/x86_64-pc-windows-gnu/release/punchd-bridge-rs.exe target/release/
      - name: Build MSI
        run: |
          New-Item -ItemType Directory -Force -Path bridges/punchd-bridge-rs/out
          wix build bridges/punchd-bridge-rs/installer/GatewayProduct.wxs -arch x64 `
            -bindpath PunchdDir=bridges/punchd-bridge-rs/target/release `
            -o bridges/punchd-bridge-rs/out/PunchdGateway.msi
      - uses: actions/upload-artifact@v4
        with:
          name: PunchdGateway-windows-msi
          path: bridges/punchd-bridge-rs/out/PunchdGateway.msi

  # ════════════════════════════════════════════════════════════════
  # TideSSP — standalone MSI (Windows only, passwordless RDP)
  # ════════════════════════════════════════════════════════════════
  build-tidessp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WiX
        run: dotnet tool install --global wix --version 6.0.2
      - name: Build TideSSP DLLs
        run: |
          cmake -B tide-ssp/build -S tide-ssp -A x64
          cmake --build tide-ssp/build --config Release
      - name: Build MSI
        run: |
          wix build tide-ssp/installer/Product.wxs -arch x64 `
            -bindpath BinDir=tide-ssp/build/Release `
            -bindpath InstallerDir=tide-ssp/installer `
            -o tide-ssp/out/TideSSP.msi
      - uses: actions/upload-artifact@v4
        with:
          name: TideSSP-installer
          path: tide-ssp/out/TideSSP.msi

  # ════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ════════════════════════════════════════════════════════════════
  release:
    needs:
      - build-vpn-msi
      - build-vpn-deb
      - build-vpn-macos
      - build-endpoint-windows
      - build-endpoint-linux
      - build-endpoint-macos
      - build-gateway-windows
      - build-tidessp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/punchd-vpn-windows-msi/punchd-vpn.msi
            artifacts/punchd-vpn-linux-deb/*.deb
            artifacts/punchd-vpn-macos-x64/*.tar.gz
            artifacts/punchd-vpn-macos-arm64/*.tar.gz
            artifacts/PunchdEndpoint-windows-msi/PunchdEndpoint.msi
            artifacts/PunchdGateway-windows-msi/PunchdGateway.msi
            artifacts/punchd-gateway-linux-deb/punchd-gateway-linux-x64.deb
            artifacts/punchd-gateway-macos-x64/*.tar.gz
            artifacts/punchd-gateway-macos-arm64/*.tar.gz
            artifacts/TideSSP-installer/TideSSP.msi
