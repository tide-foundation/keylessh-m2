name: Build and Push Punchd Gateway

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: false
        default: 'latest'
        type: string

env:
  GATEWAY_IMAGE: tideorg/punchd-gateway

jobs:
  build-and-push:
    name: Build and Push Gateway Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./bridges/punchd-bridge-rs
          file: ./bridges/punchd-bridge-rs/Dockerfile
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:${{ inputs.tag || 'latest' }}
            ${{ env.GATEWAY_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
