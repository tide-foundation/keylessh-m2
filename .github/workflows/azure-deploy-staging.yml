name: Deploy Staging to Azure App Service

on:
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: keylessh-staging
  NODE_VERSION: '22.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy TideCloak config
        run: cp data/tidecloak.json client/src/tidecloakAdapter.json

      - name: Build application
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp -r script deploy/
          mkdir -p deploy/data
          cp data/tidecloak.json deploy/data/

          cd deploy
          npm ci --omit=dev
          npm rebuild better-sqlite3

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
          package: deploy
